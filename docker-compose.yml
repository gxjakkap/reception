services:
  db:
    image: postgres:17-alpine
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-supersecurepassword}
      POSTGRES_DB: ${PG_DBNAME:-reception}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 10s
      timeout: 5s
      retries: 5

  atlas:
    image: arigaio/atlas:latest
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command:
      - migrate
      - apply
      - --url
      - postgres://${PG_USER:-postgres}:${PG_PASSWORD:-supersecurepassword}@db:5432/${PG_DBNAME:-reception}?sslmode=disable
      - --dir
      - file:///migrations

  bot:
    build: .
    restart: always
    depends_on:
      atlas:
        condition: service_completed_successfully
    environment:
      TOKEN: ${TOKEN}
      REM_CMD: ${REM_CMD:-true}
      HEALTHCHECK: ${HEALTHCHECK:-false}
      PG_HOST: db
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-pass}
      PG_DBNAME: ${PG_DBNAME:-reception}
      PG_PORT: 5432
      PG_SSLMODE: disable
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_REGION: ${S3_REGION:-auto}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
    ports:
      - "8000:8000"

volumes:
  db_data:
